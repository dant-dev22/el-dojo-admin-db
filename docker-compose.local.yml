services:
  mysql:
    image: mysql:8.0
    container_name: eldojo-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_local_password
      MYSQL_DATABASE: eldojo_db
      MYSQL_USER: eldojo_app
      MYSQL_PASSWORD: N7_xK9mP2_vQ
    ports:
      - "3307:3306"
    volumes:
      - eldojo_mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot_local_password"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  eldojo_mysql_data: